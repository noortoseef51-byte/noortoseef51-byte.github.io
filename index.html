<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>EVEE PRO - CYBER MINING</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
 
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5981641117532535"
     crossorigin="anonymous"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5981641117532535"
     crossorigin="anonymous"></script>
  
  <style>
    :root { --glow: #00f2ff; --bg: #050508; --gold: #ffd700; --red: #ff0000; --green: #00ff88; }
    * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
    body { background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; min-height: 100vh; }
    .hidden { display: none !important; }

    /* AUTH SECTION */
    .auth-overlay { position: fixed; inset: 0; background: #000; z-index: 60000; display: flex; align-items: center; justify-content: center; }
    .auth-box { width: 90%; max-width: 380px; text-align: center; border: 2px solid var(--glow); padding: 30px; border-radius: 20px; box-shadow: 0 0 30px rgba(0, 242, 255, 0.2); background: #000; }
    input { width: 100%; padding: 14px; margin-bottom: 12px; background: #111; color: white; border: 1px solid #333; border-radius: 10px; font-family: 'Rajdhani'; font-size: 16px; }
    .btn-main { width: 100%; padding: 15px; background: var(--glow); border: none; border-radius: 10px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; color: #000; transition: 0.3s; box-shadow: 0 0 15px var(--glow); }

    /* DASHBOARD */
    header { background: #000; padding: 15px; border-bottom: 2px solid var(--glow); text-align: center; font-family: 'Orbitron'; color: var(--glow); letter-spacing: 3px; }
    .stat-card { background: rgba(0, 242, 255, 0.05); border: 1px solid var(--glow); border-radius: 15px; padding: 25px; margin: 20px; text-align: center; box-shadow: inset 0 0 15px rgba(0, 242, 255, 0.1); }
    .balance-num { font-family: 'Orbitron'; font-size: 45px; color: var(--glow); text-shadow: 0 0 15px var(--glow); }

    /* NEW MINING AD THEME */
    .mining-area { background: #000; border: 2px solid var(--gold); border-radius: 20px; padding: 15px; margin: 20px; position: relative; overflow: hidden; box-shadow: 0 0 20px rgba(255, 215, 0, 0.1); }
    .ad-slot { min-height: 250px; background: #0a0a0a; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; border: 1px solid #222; position: relative; }
    .ad-slot::before { content: "MINING STREAM ACTIVE"; position: absolute; top: 10px; left: 10px; font-size: 10px; color: var(--gold); font-family: 'Orbitron'; animation: blink 1s infinite; }
    
    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

    /* WITHDRAWAL SECTION */
    .locked-box { border: 1px solid var(--red); opacity: 0.5; border-radius: 15px; padding: 15px; margin: 20px; text-align: center; position: relative; }
    .lock-icon { font-size: 12px; color: var(--red); font-family: 'Orbitron'; display: block; margin-bottom: 5px; }

    /* ADMIN */
    .admin-panel { padding: 20px; background: #000; height: 100vh; overflow-y: auto; border: 3px solid var(--gold); }
    .u-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #222; align-items: center; }
  </style>
</head>
<body>

  <div id="auth-screen" class="auth-overlay">
    <div id="auth-box" class="auth-box">
      <h1 id="auth-title" style="font-family:Orbitron; margin-bottom:20px;">EVEE ACCESS</h1>
      <p id="auth-msg" style="color:var(--red); font-size:13px; margin-bottom:10px;"></p>
      <input type="text" id="email" placeholder="GMAIL ADDRESS or 'ADMIN'">
      <input type="password" id="pass" placeholder="ACCESS CODE">
      <button onclick="processAuth()" id="authBtn" class="btn-main">INITIALIZE</button>
      <span onclick="toggleAuth()" id="auth-toggle" style="margin-top:20px; display:block; cursor:pointer; font-size:14px; color:#888;">New User? <b style="color:var(--glow)">REGISTER</b></span>
    </div>
  </div>

  <div id="admin-panel" class="admin-panel hidden">
    <h2 style="font-family:Orbitron; color:var(--gold); text-align:center; margin-bottom:20px;">MASTER COMMAND</h2>
    <div style="display:flex; justify-content:space-around; margin-bottom:20px;">
        <div style="text-align:center;"><small>USERS</small><div id="total-u" style="color:var(--glow); font-size:20px;">0</div></div>
        <div style="text-align:center;"><small>TOTAL EVEE</small><div id="total-e" style="color:var(--gold); font-size:20px;">0.00</div></div>
    </div>
    <div id="u-list"></div>
    <button onclick="location.reload()" class="btn-main" style="background:var(--red); color:white; margin-top:30px;">EXIT</button>
  </div>

  <div id="dashboard" class="hidden">
    <header>EVEE PRO v15.0</header>
    
    <div class="stat-card">
      <small style="color:#666; letter-spacing:1px;">IDENTITY: <span id="u-id" style="color:var(--glow)">---</span></small>
      <div class="balance-num"><span id="balance">0.00</span> <small style="font-size:15px;">EVEE</small></div>
    </div>

    <div class="mining-area">
      <div class="ad-slot">
        <p style="color:#222; font-family:Orbitron;">LOADING AD STREAM...</p>
        </div>
      <button id="earnBtn" onclick="mineEvee()" class="btn-main">EXECUTE MINING (0.25)</button>
    </div>

    <div class="locked-box">
      <span class="lock-icon">⚠️ WITHDRAWAL PROTOCOL LOCKED</span>
      <p style="font-size:11px; color:#aaa;">Admin announcement in 2-3 months.</p>
    </div>
    
    <button onclick="location.reload()" style="background:none; border:none; color:#333; width:100%; padding:20px;">LOGOUT SYSTEM</button>
  </div>

  <script>
    const firebaseConfig = { apiKey: "AIzaSyA806HxxZejS_l5_pWAb9cJ0pbbhNhgR8A", authDomain: "call-2b58d.firebaseapp.com", projectId: "call-2b58d" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const MASTER_KEY = "BOSS@786";
    let isReg = false;
    let currentUser = null;

    function toggleAuth() {
      isReg = !isReg;
      document.getElementById('auth-title').innerText = isReg ? "REGISTER" : "LOGIN";
      document.getElementById('auth-toggle').innerHTML = isReg ? "Already have account? <b style='color:var(--glow)'>LOGIN</b>" : "New User? <b style='color:var(--glow)'>REGISTER</b>";
    }

    async function processAuth() {
      const email = document.getElementById('email').value.trim().toLowerCase();
      const pass = document.getElementById('pass').value;
      const msg = document.getElementById('auth-msg');

      if(email === "admin" && pass === MASTER_KEY) return showAdmin();
      if(!email.includes("@gmail.com")) return msg.innerText = "USE GMAIL ADDRESS";

      try {
        const doc = await db.collection("evee_users").doc(email).get();
        if(isReg) {
          if(doc.exists) return msg.innerText = "ALREADY EXISTS";
          await db.collection("evee_users").doc(email).set({ password: pass, balance: 0.00 });
          alert("Success! Now Login."); toggleAuth();
        } else {
          if(!doc.exists || doc.data().password !== pass) return msg.innerText = "INVALID CREDENTIALS";
          currentUser = { email, ...doc.data() };
          showDash();
        }
      } catch (e) { msg.innerText = "ERROR"; }
    }

    async function showAdmin() {
      document.getElementById('auth-screen').classList.add('hidden');
      document.getElementById('admin-panel').classList.remove('hidden');
      const snap = await db.collection("evee_users").get();
      let tu = 0, te = 0, list = "";
      snap.forEach(d => {
        tu++; te += d.data().balance;
        list += `<div class="u-item"><span>${d.id.split('@')[0]}</span><b>${d.data().balance.toFixed(2)}</b><button onclick="resetU('${d.id}')" style="background:var(--red); color:white; border:none; padding:4px; border-radius:4px;">RESET</button></div>`;
      });
      document.getElementById('u-list').innerHTML = list;
      document.getElementById('total-u').innerText = tu;
      document.getElementById('total-e').innerText = te.toFixed(2);
    }

    async function resetU(id) { if(confirm("Reset?")) { await db.collection("evee_users").doc(id).update({balance:0}); showAdmin(); } }

    function showDash() {
      document.getElementById('auth-screen').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      document.getElementById('u-id').innerText = currentUser.email.split('@')[0].toUpperCase();
      document.getElementById('balance').innerText = currentUser.balance.toFixed(2);
    }

    async function mineEvee() {
      const btn = document.getElementById('earnBtn');
      btn.disabled = true;
      let time = 10;
      const t = setInterval(async () => {
        btn.innerText = `MINING DATA... ${time}s`;
        time--;
        if(time < 0) {
          clearInterval(t);
          currentUser.balance += 0.25;
          document.getElementById('balance').innerText = currentUser.balance.toFixed(2);
          await db.collection("evee_users").doc(currentUser.email).update({ balance: currentUser.balance });
          btn.disabled = false; btn.innerText = "EXECUTE MINING (0.25)";
        }
      }, 1000);
    }
  </script>
</body>
</html>
